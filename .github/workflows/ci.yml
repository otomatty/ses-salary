name: CI

# PR ごと（および main への push）に typecheck → test → build を実行する。
on:
  pull_request:
  push:
    branches: [main]

# 同一ブランチで新しい push があれば古い実行を打ち切る。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # パッケージマネージャは Bun（package.json の packageManager に準拠）。
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      # ユニット（src/shared）と Worker API 統合（workerd + D1）の両プロジェクト。
      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
