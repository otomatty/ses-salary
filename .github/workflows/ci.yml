name: CI

# PR ごと（および main への push）に typecheck → test → build を実行する。
on:
  pull_request:
  push:
    branches: [main]

# 同一ブランチで新しい push があれば古い実行を打ち切る。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # supply chain 対策として action はコミット SHA でピン留めする（タグはコメントで明示）。
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # 認証情報を .git/config に残さない（後続ステップへの漏えい防止）。
          persist-credentials: false

      # パッケージマネージャは Bun（package.json の packageManager に準拠）。
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      # ユニット（src/shared）と Worker API 統合（workerd + D1）の両プロジェクト。
      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
